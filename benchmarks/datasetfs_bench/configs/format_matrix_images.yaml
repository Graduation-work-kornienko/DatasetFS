# Format matrix (thesis graph G1) — images.
#
# Same Imagenette files, stored in every format we support, compared on
# throughput. SimpleCNN keeps training LOADER-BOUND so the storage/decode tax of
# each format dominates runtime (a heavy model would mask it behind compute).
# `synthetic` is the compute-only ceiling; the gap to it is each format's tax.
# `ffcv` auto-skips on macOS (Linux-only) — the runner logs SKIP and moves on.
#
# Metrics discipline: hypothesis = "DFS is competitive in the loader-bound
# regime as a packed byte-store with shared-memory transport; byte-store formats
# (LMDB/HDF5/TFRecord) win on no-per-file-open + page-cache locality vs
# ImageFolder." Server-side rgb_uint8 decode is intentionally excluded from the
# main matrix because diagnostics show it is CPU/priming sensitive on Imagenette;
# keep it in diagnostic_datasetfs_rgb.yaml until the daemon decode path is tuned.
# The full metric set (sps, TTFB, stall%, fetch p50/95/99, sys CPU/RSS/disk, DFS
# /metrics) is captured per cell by the runner.

dataset:
  name: imagenette
  imagefolder: data/formats/imagenette/imagefolder
  webdataset: data/formats/imagenette/webdataset
  datasetfs: data/formats/imagenette/datasetfs
  huggingface: data/formats/imagenette/huggingface
  lmdb: data/formats/imagenette/lmdb
  hdf5: data/formats/imagenette/hdf5
  tfrecord: data/formats/imagenette/tfrecord
  ffcv: data/formats/imagenette/ffcv

model: simplecnn
batch_size: 64
num_workers: 2
image_size: 96

epochs: 2
warmup_epochs: 1
max_batches_per_epoch: 80
# Drop the first N batches of each measured epoch from the steady-state
# throughput window — excludes the one-time DataLoader worker-spawn + pipeline
# priming ramp UNIFORMLY across formats (map-style spawn in iter(), iterable in
# first next()). Without this the bar chart penalizes IterableDataset loaders
# (DatasetFS/WebDataset/TFRecord) for spawn the others hide. See train/loop.py.
warmup_batches: 10

seeds: [0, 1, 2]
loaders:
  - imagefolder
  - webdataset
  - datasetfs
  - huggingface
  - lmdb
  - hdf5
  - tfrecord
  - ffcv
  - synthetic

# synthetic compute-ceiling epoch length (no I/O).
synthetic_samples: 10000

drop_page_cache_between_cells: false

daemon_binary: bin/datasetfs
