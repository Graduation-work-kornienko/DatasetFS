# Tiny sweep config for verifying the sweep runner end-to-end.
# 2 axis values × 3 loaders × 1 seed = 6 cells. Each cell runs 1 epoch capped
# at 10 batches → roughly 1-2 min total on CPU.

matrix:
  num_workers: [2, 4]

dataset:
  name: imagenette
  imagefolder: data/formats/imagenette/imagefolder
  webdataset: data/formats/imagenette/webdataset
  datasetfs: data/formats/imagenette/datasetfs

model: simplecnn
batch_size: 32
image_size: 64

epochs: 1
warmup_epochs: 0
max_batches_per_epoch: 10

seeds: [0]
loaders: [imagefolder, webdataset, datasetfs]

# Smoke runs skip the cache drop (faster + doesn't require sudo).
drop_page_cache_between_cells: false

daemon_binary: bin/fuse_daemon
