# Format matrix (G1) — images, Imagewoof. Second dataset for the grouped-bar
# cross-dataset figure. Same axes as format_matrix_images.yaml; see that file
# for the full hypothesis + metric rationale.

dataset:
  name: imagewoof
  imagefolder: data/formats/imagewoof/imagefolder
  webdataset: data/formats/imagewoof/webdataset
  datasetfs: data/formats/imagewoof/datasetfs
  huggingface: data/formats/imagewoof/huggingface
  lmdb: data/formats/imagewoof/lmdb
  hdf5: data/formats/imagewoof/hdf5
  tfrecord: data/formats/imagewoof/tfrecord
  ffcv: data/formats/imagewoof/ffcv

model: simplecnn
batch_size: 64
num_workers: 2
image_size: 96

epochs: 2
warmup_epochs: 1
max_batches_per_epoch: 80
warmup_batches: 10

seeds: [0, 1, 2]
loaders: [imagefolder, webdataset, datasetfs, huggingface, lmdb, hdf5, tfrecord, ffcv, synthetic]

synthetic_samples: 10000

drop_page_cache_between_cells: false

daemon_binary: bin/datasetfs
