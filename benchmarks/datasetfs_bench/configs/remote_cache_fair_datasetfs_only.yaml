# DatasetFS-only continuation for remote_cache_fair.yaml.
# WebDataset cached rows were already collected separately; this config reruns
# only DatasetFS with a larger client timeout because the first Yandex.Disk shard
# download can exceed the default 60 seconds.

remote_limits:
  max_total_bytes: 6442450944

dataset:
  name: publaynet_remote_subset
  imagefolder: runs/remote_stage/publaynet/imagefolder
  webdataset: runs/remote_stage/publaynet/webdataset
  datasetfs: runs/remote_stage/publaynet/datasetfs

datasetfs_remote:
  root_url: ydisk://datasetfs-bench/formats/publaynet/datasetfs
  manifest_url: ydisk://datasetfs-bench/remote_subsets/publaynet_6g/datasetfs/metadata.parquet
  cache_dir: runs/remote_cache/datasetfs
  prefetch_concurrency: 2
  remote_throttle: 20971520

model: simplecnn
batch_size: 64
num_workers: 2
image_size: 96

epochs: 2
warmup_epochs: 1
max_batches_per_epoch: 80
warmup_batches: 5
dfs_timeout_seconds: 600

seeds: [0, 1, 2]

loaders:
  - format: datasetfs
    name: datasetfs-remote

reset_remote_caches_before_seed: true
drop_page_cache_between_cells: false
daemon_metrics_interval_s: 0.5

daemon_binary: bin/datasetfs
